<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風会議 in こまつ | こまつの声を、次の一歩へ。</title>
<style>
:root {
  --color-base: #FFFFFF;
  --color-bg-light: #F7F9FA;
  --color-main: #123A5A;
  --color-accent: #2B8C8C;
  --color-accent-hover: #227070;
  --color-sub: #F5B942;
  --color-text: #1F2933;
  --color-text-light: #606F7B;
  --color-border: #E4E7EB;
  --color-error: #E74C3C;
  --color-success: #2ECC71;
  
  --font-base: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-full: 9999px;
  
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.12);
  
  --transition: all 0.3s ease;
  
  --space-xs: 8px;
  --space-sm: 16px;
  --space-md: 32px;
  --space-lg: 64px;
  --space-xl: 96px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-base);
  color: var(--color-text);
  background-color: var(--color-base);
  line-height: 1.8;
  font-size: 16px;
}

a { text-decoration: none; color: inherit; transition: var(--transition); }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

h1, h2, h3 { color: var(--color-main); font-weight: bold; }
.container { max-width: 1000px; margin: 0 auto; padding: 0 var(--space-md); }
section { padding: var(--space-xl) 0; }
.bg-light { background-color: var(--color-bg-light); }

header {
  position: fixed; top: 0; width: 100%;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(8px);
  z-index: 100;
  border-bottom: 1px solid var(--color-border);
  height: 72px;
}
.header-inner { display: flex; justify-content: space-between; align-items: center; height: 100%; max-width: 1200px; margin: 0 auto; padding: 0 var(--space-md); }

.btn { display: inline-flex; align-items: center; padding: 16px 32px; border-radius: var(--radius-full); font-weight: bold; background-color: var(--color-accent); color: var(--color-base); }

/* 簡易フォームスタイル */
.form-container { background: var(--color-base); padding: var(--space-lg); border: 1px solid var(--color-border); border-radius: var(--radius-md); }
.form-group { margin-bottom: var(--space-md); }
input, textarea, select { width: 100%; padding: 12px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">風会議 in こまつ</div>
  </div>
</header>

<main style="margin-top: 72px;">
  <section>
    <div class="container">
      <h1>こまつの声を、次の一歩へ。</h1>
      <p>小松で暮らし、働き、学ぶ中で感じていることを聞かせてください。</p>
    </div>
  </section>

  <section class="bg-light" id="voice-form">
    <div class="container">
      <div class="form-container">
        <h2>声を届ける</h2>
        <form id="voice-form-element">
          <div class="form-group">
            <label>小松で「変わるともっと良いと思うこと」</label>
            <textarea name="v_change" required placeholder="例：交通の利便性、子育て支援など"></textarea>
          </div>
          <button type="submit" class="btn">送信する</button>
        </form>
      </div>
    </div>
  </section>
</main>

<script>
  document.getElementById('voice-form-element').addEventListener('submit', (e) => {
    e.preventDefault();
    alert('送信されました。ご協力ありがとうございます。');
  });
</script>

</body>
</html>
